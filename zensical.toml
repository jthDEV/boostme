[project]
site_name = "boostME Help"
site_description = "Online help for the boostME fitness coaching platform"
site_author = "boostME Team"
site_url = "https://jthdev.github.io/boostME/"
copyright = """
Copyright &copy; 2026 Jan Thielscher
"""

[project.theme]
language = "en"
favicon = "assets/favicon.png"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[project.theme.features]
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.integrate",
]

[project.extra]
extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/brand.js"]

[[project.nav]]
Home = "index.md"

[[project.nav]]
"Getting Started" = [
  { "Overview" = "getting-started/index.md" },
  { "Registration & Login" = "getting-started/registration.md" },
  { "Your Profile" = "getting-started/profile.md" },
]

[[project.nav]]
"Athlete Guide" = [
  { "Overview" = "athlete/index.md" },
  { "Training Plans" = "athlete/plans.md" },
  { "Sessions & Timers" = "athlete/sessions.md" },
  { "Feedback & Results" = "athlete/feedback.md" },
  { "Workout History" = "athlete/history.md" },
  { "Coaches" = "athlete/coaches.md" },
  { "Daily WODs & Leaderboard" = "athlete/wods.md" },
]

[[project.nav]]
"Coach Guide" = [
  { "Overview" = "coach/index.md" },
  { "Onboarding & Accreditation" = "coach/onboarding.md" },
  { "Profile Setup" = "coach/profile.md" },
  { "Managing Athletes" = "coach/athletes.md" },
  { "WOD Builder" = "coach/wod-builder-guide.md" },
  { "Session Editing" = "coach/session-editing.md" },
]

[[project.nav]]
Changelog = "changelog.md"

[project.markdown_extensions]
pymdownx.superfences = {}
pymdownx.tabbed = { alternate_style = true }
admonition = {}
pymdownx.details = {}
attr_list = {}
md_in_html = {}
tables = {}
